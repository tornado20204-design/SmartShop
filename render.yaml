# SmartShop — Render.com Deploy Configuration
services:
  - type: web
    name: smartshop
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && cd backend && npm install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true